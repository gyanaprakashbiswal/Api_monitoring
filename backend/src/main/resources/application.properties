# Application Properties
spring.application.name=sentinel-zero-g
# Logging for security troubleshooting
logging.level.org.springframework.security=DEBUG
logging.level.com.sentinel=TRACE

# H2 Database
spring.datasource.url=jdbc:h2:mem:sentineldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=5A7134743777217A25432A462D4A614E645267556B58703273357638792F423F
jwt.expiration=86400000

# Async Config
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Scheduling
spring.task.scheduling.pool.size=5

# Server
server.port=8080

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.sentinel=DEBUG
